        function getZodiacSign(date) {
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const dateStr = String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');

            for (let sign of zodiacSigns) {
                if (dateStr >= sign.dates[0] && dateStr <= sign.dates[1]) {
                    return sign;
                }
            }
            return zodiacSigns[0];
        }

        function getRisingSign(birthDate, birthTime) {
            const hour = parseInt(birthTime.split(':')[0]);
            const signs = ["Aries", "Tauro", "Géminis", "Cáncer", "Leo", "Virgo", "Libra", "Escorpio", "Sagitario", "Capricornio", "Acuario", "Piscis"];
            const index = (hour + birthDate.getDate()) % 12;
            return signs[index];
        }

        function getMoonSign(birthDate) {
            const day = birthDate.getDate();
            const signs = ["Aries", "Tauro", "Géminis", "Cáncer", "Leo", "Virgo", "Libra", "Escorpio", "Sagitario", "Capricornio", "Acuario", "Piscis"];
            return signs[day % 12];
        }

        function getLifePathNumber(date) {
            const digits = date.replace(/-/g, '').split('').map(Number);
            let sum = digits.reduce((a, b) => a + b, 0);
            while (sum > 9) {
                sum = String(sum).split('').map(Number).reduce((a, b) => a + b, 0);
            }
            return sum;
        }

        function getChineseZodiac(year) {
            const animals = ["Mono", "Gallo", "Perro", "Cerdo", "Rata", "Buey", "Tigre", "Conejo", "Dragón", "Serpiente", "Caballo", "Cabra"];
            return animals[year % 12];
        }

        function calculateCompatibility(sign, city) {
            let score = 50;

            // Element match
            if (city.bestFor.includes(sign.element)) {
                score += 25;
            }

            // Time-based variation
            const date = new Date();
            score += (date.getDate() % 10);

            // Random but deterministic variation
            const seed = sign.name.length + city.name.length;
            score += (seed % 15);

            // Cap between 60 and 98
            return Math.min(98, Math.max(60, score));
        }

            const moon = getMoonSign(dateObj);
            const lifePath = getLifePathNumber(birthDate);
            const chinese = getChineseZodiac(dateObj.getFullYear());

            // Calculate scores for each city
            const scoredCities = cities.map(city => {
                return {
                    ...city,
                    score: calculateCompatibility(sign, city)
                };
            }).sort((a, b) => b.score - a.score);

            // Render birth chart
            const chartHTML = `
                <h2>🌙 Tu Carta Astral de Nacimiento</h2>
                <div class="chart-grid">
                    <div class="chart-item">
                        <div class="label">Signo Solar</div>
                        <div class="value"><span class="zodiac-icon">${sign.icon}</span>${sign.name} <span class="element-badge element-${sign.element}">${sign.element}</span></div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Ascendente</div>
                        <div class="value">${rising}</div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Signo Lunar</div>
                        <div class="value">${moon}</div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Número de Vida</div>
                        <div class="value">${lifePath}</div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Horóscopo Chino</div>
                        <div class="value">${chinese}</div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Lugar de Nacimiento</div>
                        <div class="value">${birthPlace}</div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Hora de Nacimiento</div>
                        <div class="value">${birthTime}</div>
                    </div>
                    <div class="chart-item">
                        <div class="label">Zona Horaria</div>
                        <div class="value">${timezone}</div>
                    </div>
                </div>
            `;

            document.getElementById('birthChart').innerHTML = chartHTML;

            // Render places
            let placesHTML = '<h2>🏆 Top Lugares Donde Tu Ser Brillará Más</h2>';

            scoredCities.forEach((city, index) => {
                const rank = index + 1;
                const crown = rank === 1 ? '👑 ' : '';
                const bestBadge = rank === 1 ? '<span class="best-match-badge">MEJOR MATCH</span>' : '';

                placesHTML += `
                    <div class="place-card rank-${rank}">
                        ${bestBadge}
                        <div class="place-header">
                            <div class="place-name">${crown}${city.name}</div>
                            <div class="place-rank">#${rank}</div>
                        </div>
                        <div class="percentage-bar">
                            <div class="percentage-fill" data-width="${city.score}%">${city.score}% compatibilidad</div>
                        </div>
                        <div class="reasons">
                            ${city.tags.map(tag => `<span class="reason-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="place-description">${city.description}</div>
                    </div>
                `;
            });

            document.getElementById('placesSection').innerHTML = placesHTML;

            // Show results
            document.getElementById('results').style.display = 'block';
            document.getElementById('formSection').style.display = 'none';

            // Animate bars
            setTimeout(() => {
                document.querySelectorAll('.percentage-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-width');
                });
            }, 300);

            // Scroll to results
            document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
