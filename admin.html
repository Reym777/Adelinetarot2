<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c0a1d" />
  <!-- URL del backend (FastAPI). Dejalo vacio si el backend sirve esta pagina.
       En GitHub Pages u otro hosting estatico, pon aqui la URL publica del
       backend, p. ej. content="https://tu-backend.onrender.com" -->
  <meta name="adeline-api-base" content="" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23e8c66b'/%3E%3Ccircle cx='11' cy='13' r='10' fill='%230c0a1d'/%3E%3C/svg%3E" />
  <title>AdelineTarot · Panel privado</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html"><span class="moon" aria-hidden="true"></span> AdelineTarot</a>
      <nav class="nav-links">
        <a href="index.html">Ver sitio</a>
        <a href="#" id="logoutLink" class="hidden">Cerrar sesión</a>
      </nav>
    </div>
  </header>

  <!-- LOGIN -->
  <div class="admin-login" id="loginView">
    <div class="panel">
      <h2 class="section-title" style="font-size:1.8rem;margin-bottom:8px">Panel de AdelineTarot</h2>
      <p class="section-sub" style="margin-bottom:24px">Introduce tu clave de administración para ver las consultas.</p>
      <div class="field full">
        <label for="tokenInput">Clave de administración</label>
        <input id="tokenInput" type="password" placeholder="ADELINE_ADMIN_TOKEN" autocomplete="current-password" />
      </div>
      <div id="loginAlert"></div>
      <button class="btn btn-primary btn-block" id="loginBtn" style="margin-top:14px">Entrar</button>
      <p class="hint" style="margin-top:14px">La clave aparece en la consola del servidor al iniciarlo (o defínela en <code>ADELINE_ADMIN_TOKEN</code>).</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="admin-shell hidden" id="dashView">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px">
      <div>
        <h1 style="font-size:2rem">Consultas</h1>
        <p class="muted" id="statsLine">—</p>
      </div>
      <button class="btn btn-ghost" id="refreshBtn">↻ Actualizar</button>
    </div>
    <div id="dashAlert"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ref.</th><th>Nombre</th><th>Nacimiento</th><th>Lugar</th>
            <th>Plan</th><th>Estado</th><th>Creada</th>
          </tr>
        </thead>
        <tbody id="bookingsBody">
          <tr><td colspan="7" class="muted">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL DETALLE -->
  <div class="modal-overlay hidden" id="detailModal">
    <div class="modal">
      <div class="modal-head">
        <h2 id="mName" style="color:var(--gold)">—</h2>
        <button class="icon-btn" id="closeModal" aria-label="Cerrar">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="assets/admin.js"></script>
</body>
</html>
